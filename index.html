<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Site Visits — Live Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E11;
    --panel:#12161B;
    --card:#1B2027;
    --card-border:#2A313A;
    --amber:#FFB000;
    --amber-dim:#7A5800;
    --text:#E8E6E1;
    --muted:#7C8592;
    --green:#4ADE80;
    --blue:#5FA8F5;
    --pink:#F472B6;
    --gold:#FBBF24;
    --purple:#A78BFA;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    height:100%;
    overflow-x:hidden;
  }
  .board{
    max-width:1400px;
    margin:0 auto;
    padding:28px 32px 48px;
  }

  /* ---- Header ---- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:3px solid var(--amber);
    padding-bottom:16px;
    margin-bottom:28px;
  }
  .brand{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand .eyebrow{
    font-size:12px;
    letter-spacing:0.35em;
    color:var(--amber);
    font-weight:600;
  }
  .brand h1{
    font-family:'Archivo Black', sans-serif;
    font-size:34px;
    letter-spacing:0.02em;
    color:var(--text);
  }
  .clock{
    text-align:right;
    font-size:13px;
    color:var(--muted);
  }
  .clock .time{
    font-size:28px;
    color:var(--amber);
    font-weight:600;
    letter-spacing:0.05em;
  }

  /* ---- Section labels ---- */
  .section-label{
    display:flex;
    align-items:center;
    gap:12px;
    margin:36px 0 14px;
  }
  .section-label h2{
    font-family:'Archivo Black', sans-serif;
    font-size:20px;
    letter-spacing:0.08em;
  }
  .section-label.now h2{color:var(--green);}
  .section-label.next h2{color:var(--blue);}
  .section-label .line{
    flex:1;
    height:1px;
    background:var(--card-border);
  }
  .page-indicator{
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--muted);
    text-transform:uppercase;
    white-space:nowrap;
  }
  .live-dot{
    width:10px; height:10px; border-radius:50%;
    background:var(--green);
    box-shadow:0 0 8px var(--green);
    animation:pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.25;}
  }

  /* ---- Table header row ---- */
  .row-header{
    display:grid;
    grid-template-columns:14px 1.1fr 0.6fr 1fr 1fr 1.2fr 1.5fr;
    gap:16px;
    padding:0 20px 8px;
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--muted);
    text-transform:uppercase;
  }

  /* ---- Cards ---- */
  .card{
    display:grid;
    grid-template-columns:14px 1.1fr 0.6fr 1fr 1fr 1.2fr 1.5fr;
    gap:16px;
    align-items:center;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:6px;
    padding:16px 20px;
    margin-bottom:10px;
    animation:flip-in 0.5s ease backwards;
  }
  .card.now{
    box-shadow: inset 3px 0 0 var(--green);
  }
  @keyframes flip-in{
    0%{ transform:rotateX(90deg); opacity:0; }
    100%{ transform:rotateX(0deg); opacity:1; }
  }
  .tag{
    width:12px; height:12px; border-radius:3px;
  }
  .tag.client{background:var(--green);}
  .tag.internal{background:var(--blue);}
  .tag.vendor{background:var(--pink);}
  .tag.audit{background:var(--gold);}
  .tag.general{background:var(--purple);}

  .staff{font-weight:600; font-size:16px;}
  .staff .sub{display:block; font-size:11px; color:var(--muted); font-weight:400; margin-top:2px; letter-spacing:0.04em;}

  .org{font-size:15px;}
  .city{font-size:15px; color:var(--text);}
  .city .pin{color:var(--muted); font-size:12px; margin-right:4px;}

  .state{font-size:15px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;}

  .dates{font-size:14px; color:var(--text);}
  .dates .range{color:var(--muted); font-size:12px; display:block;}

  .status-pill{
    justify-self:start;
    font-size:11px;
    letter-spacing:0.06em;
    padding:5px 10px;
    border-radius:20px;
    text-transform:uppercase;
    font-weight:600;
  }
  .status-pill.client{background:rgba(74,222,128,0.12); color:var(--green);}
  .status-pill.internal{background:rgba(95,168,245,0.12); color:var(--blue);}
  .status-pill.vendor{background:rgba(244,114,182,0.12); color:var(--pink);}
  .status-pill.audit{background:rgba(251,191,36,0.12); color:var(--gold);}
  .status-pill.general{background:rgba(167,139,250,0.12); color:var(--purple);}

  footer{
    margin-top:40px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.08em;
    border-top:1px solid var(--card-border);
    padding-top:14px;
  }

  @media (max-width:900px){
    .row-header{display:none;}
    .card{grid-template-columns:14px 1fr; grid-template-rows:auto auto auto auto auto; row-gap:6px;}
  }

  .loading, .empty, .error{
    color:var(--muted);
    font-size:14px;
    padding:16px 20px;
  }
  .error{color:var(--pink);}

  /* ---- Portrait / vertical monitor adjustments ---- */
  @media (orientation:portrait){
    .board{ max-width:100%; padding:20px 16px 40px; }
    .brand h1{ font-size:26px; }
    .row-header{display:none;}
    .card{
      grid-template-columns:1fr 14px;
      grid-template-rows:auto auto auto auto auto;
      row-gap:8px;
      padding:18px 20px;
    }
    .status-pill{ justify-self:start; }
  }

  /* ---- Fullscreen toggle button ---- */
  #fullscreen-btn{
    position:fixed;
    bottom:16px;
    right:16px;
    background:var(--card);
    border:1px solid var(--card-border);
    color:var(--amber);
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
    z-index:1000;
    transition:opacity 0.3s ease;
  }
  #fullscreen-btn:hover{ border-color:var(--amber); }
  #fullscreen-btn.hidden{ opacity:0; pointer-events:none; }
</style>
</head>
<body>
<button id="fullscreen-btn">⛶ Full Screen</button>
<div class="board">

  <header>
    <div class="brand">
      <span class="eyebrow">FIELD OPERATIONS</span>
      <h1>SITE VISITS</h1>
    </div>
    <div class="clock">
      <div>Wednesday, July 15</div>
      <div class="time" id="clock">10:42 AM</div>
    </div>
  </header>

  <!-- CURRENTLY ON SITE -->
  <div class="section-label now">
    <span class="live-dot"></span>
    <h2>CURRENTLY ON SITE</h2>
    <div class="line"></div>
    <span class="page-indicator" id="current-page-indicator"></span>
  </div>

  <div class="row-header">
    <span></span><span>Dates</span><span>State</span><span>City</span><span>Team</span><span>Staff</span><span>Organization</span>
  </div>

  <div id="current-list">
    <div class="loading">Loading current visits…</div>
  </div>

  <!-- UPCOMING -->
  <div class="section-label next">
    <span style="width:10px;height:10px;"></span>
    <h2>UPCOMING VISITS</h2>
    <div class="line"></div>
    <span class="page-indicator" id="upcoming-page-indicator"></span>
  </div>

  <div class="row-header">
    <span></span><span>Dates</span><span>State</span><span>City</span><span>Team</span><span>Staff</span><span>Organization</span>
  </div>

  <div id="upcoming-list">
    <div class="loading">Loading upcoming visits…</div>
  </div>

  <footer>
    <span id="footer-counts">— STAFF IN FIELD · — SCHEDULED</span>
    <span id="footer-status">CONNECTING TO AIRTABLE…</span>
  </footer>

</div>

<script>
  /* ============================================================
     AIRTABLE CONFIG — fill in these four values for your base
     ============================================================ */
  const CONFIG = {
    PAT: "patb8wJL8kbX0imAy.33e6643e514163458b40e9faa092f6778d229e081889ddd63f62258a076b320e",
    BASE_ID: "appSZCigHtsRo3v9H",
    TABLE_NAME: "Visits",                            // exact table name (or table ID, starts with "tbl...")
    VIEW_CURRENT: "Currently",                        // matches your actual view name
    VIEW_UPCOMING: "Upcoming",                        // the view name we built earlier
    REFRESH_SECONDS: 60,                             // how often to re-check Airtable
    PAGE_SIZE: 10,                                    // how many visits to show per screen, per section
    ROTATE_SECONDS: 10                                // how long each page stays on screen before advancing
  };

  // Explicit color assignment for each team (instead of auto-hashing), so
  // colors are predictable and stay consistent as you add more visits.
  const TEAM_CLASS = {
    "HIS EYES": "client",   // green
    "S2N": "internal",      // blue
    "INOBF": "vendor",      // pink
    "IMPACT": "audit",      // gold
    "CE General": "general" // purple
  };
  const DEFAULT_CLASS = "internal";
  function colorClassFor(key){
    return TEAM_CLASS[key] || DEFAULT_CLASS;
  }

  /* ============================================================
     Clock
     ============================================================ */
  function tick(){
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h===0) h = 12;
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ampm;
    const dateEl = document.querySelector('.clock div:first-child');
    if (dateEl) {
      dateEl.textContent = now.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
    }
  }
  tick();
  setInterval(tick, 1000*30);

  /* ============================================================
     Airtable fetch + render
     ============================================================ */
  function fmtDate(d){
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric' });
  }

  function dateSubLabel(start, end, isCurrent){
    const today = new Date(); today.setHours(0,0,0,0);
    const s = new Date(start); s.setHours(0,0,0,0);
    const e = new Date(end); e.setHours(0,0,0,0);
    if (isCurrent){
      const totalDays = Math.round((e - s) / 86400000) + 1;
      const dayNum = Math.round((today - s) / 86400000) + 1;
      return totalDays <= 1 ? "Single day" : `Day ${dayNum} of ${totalDays}`;
    } else {
      const daysUntil = Math.round((s - today) / 86400000);
      return daysUntil <= 0 ? "Starting today" : `Starts in ${daysUntil} day${daysUntil === 1 ? '' : 's'}`;
    }
  }

  // Airtable fields can come back as plain strings, arrays (multi-select /
  // linked records), or objects (collaborators, single linked records).
  // This normalizes any of those shapes into a readable string.
  function fieldToText(value){
    if (value === undefined || value === null || value === "") return null;
    if (Array.isArray(value)) {
      return value.map(v => fieldToText(v)).filter(Boolean).join(", ");
    }
    if (typeof value === "object") {
      // Collaborator fields have {name, email, id}; linked records expanded
      // objects sometimes have {name} or {id}.
      return value.name || value.email || value.id || JSON.stringify(value);
    }
    return String(value);
  }

  function renderCard(record, isCurrent){
    const f = record.fields;
    const staff = fieldToText(f["Staff"]) || "—";
    const org = (fieldToText(f["Organization(s)"]) || "—").trim();
    const city = fieldToText(f["City/Region"]) || "—";
    const state = fieldToText(f["State"]) || "—";
    const team = fieldToText(f["Team"]) || "";
    const cls = colorClassFor(team);
    const start = f["Start Date"] ? new Date(f["Start Date"]) : null;
    const end = f["End Date"] ? new Date(f["End Date"]) : null;
    const dateText = (start && end) ? `${fmtDate(start)} – ${fmtDate(end)}` : "—";
    const subLabel = (start && end) ? dateSubLabel(start, end, isCurrent) : "";

    return `
      <div class="card ${isCurrent ? 'now' : ''}">
        <span class="tag ${cls}"></span>
        <span class="dates">${dateText}${subLabel ? `<span class="range">${subLabel}</span>` : ''}</span>
        <span class="state">${state}</span>
        <span class="city"><span class="pin">📍</span>${city}</span>
        <span class="status-pill ${cls}">${team || 'No team'}</span>
        <span class="staff">${staff}</span>
        <span class="org">${org}</span>
      </div>`;
  }

  async function fetchView(viewName){
    const url = `https://api.airtable.com/v0/${CONFIG.BASE_ID}/${encodeURIComponent(CONFIG.TABLE_NAME)}?view=${encodeURIComponent(viewName)}`;
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${CONFIG.PAT}` }
    });
    if (!res.ok) {
      const body = await res.text();
      throw new Error(`Airtable request failed (${res.status}): ${body}`);
    }
    const data = await res.json();
    return data.records || [];
  }

  /* ============================================================
     Pagination / rotation state
     ============================================================ */
  let allCurrentRecords = [];
  let allUpcomingRecords = [];
  let currentPageIndex = 0;
  let upcomingPageIndex = 0;

  function paginate(records, pageIndex, pageSize){
    const start = pageIndex * pageSize;
    return records.slice(start, start + pageSize);
  }

  function totalPages(records, pageSize){
    return Math.max(1, Math.ceil(records.length / pageSize));
  }

  function renderSection(listEl, indicatorEl, allRecords, pageIndex, isCurrent, emptyMessage){
    const pageSize = CONFIG.PAGE_SIZE;
    const pageRecords = paginate(allRecords, pageIndex, pageSize);
    const pages = totalPages(allRecords, pageSize);

    listEl.innerHTML = pageRecords.length
      ? pageRecords.map(r => renderCard(r, isCurrent)).join('')
      : `<div class="empty">${emptyMessage}</div>`;

    indicatorEl.textContent = pages > 1
      ? `Page ${pageIndex + 1} of ${pages} · ${allRecords.length} total`
      : (allRecords.length > 0 ? `${allRecords.length} total` : '');
  }

  function renderBoard(){
    renderSection(
      document.getElementById('current-list'),
      document.getElementById('current-page-indicator'),
      allCurrentRecords, currentPageIndex, true,
      "No one is currently on site."
    );
    renderSection(
      document.getElementById('upcoming-list'),
      document.getElementById('upcoming-page-indicator'),
      allUpcomingRecords, upcomingPageIndex, false,
      "No upcoming visits scheduled."
    );
  }

  function rotatePages(){
    const currentPages = totalPages(allCurrentRecords, CONFIG.PAGE_SIZE);
    const upcomingPages = totalPages(allUpcomingRecords, CONFIG.PAGE_SIZE);
    currentPageIndex = (currentPageIndex + 1) % currentPages;
    upcomingPageIndex = (upcomingPageIndex + 1) % upcomingPages;
    renderBoard();
  }

  async function refreshBoard(){
    const currentEl = document.getElementById('current-list');
    const upcomingEl = document.getElementById('upcoming-list');
    const statusEl = document.getElementById('footer-status');
    const countsEl = document.getElementById('footer-counts');

    try {
      const [currentRecords, upcomingRecords] = await Promise.all([
        fetchView(CONFIG.VIEW_CURRENT),
        fetchView(CONFIG.VIEW_UPCOMING)
      ]);

      allCurrentRecords = currentRecords;
      allUpcomingRecords = upcomingRecords;

      // Keep pages in bounds if the record count shrank since the last refresh
      const currentPages = totalPages(allCurrentRecords, CONFIG.PAGE_SIZE);
      const upcomingPages = totalPages(allUpcomingRecords, CONFIG.PAGE_SIZE);
      if (currentPageIndex >= currentPages) currentPageIndex = 0;
      if (upcomingPageIndex >= upcomingPages) upcomingPageIndex = 0;

      renderBoard();

      countsEl.textContent = `${currentRecords.length} STAFF IN FIELD · ${upcomingRecords.length} SCHEDULED`;
      const now = new Date();
      statusEl.textContent = `LAST UPDATED ${now.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}`;
    } catch (err) {
      console.error(err);
      statusEl.textContent = "CONNECTION ERROR — CHECK CONFIG / TOKEN";
      // Only replace the lists with an error message if they're still empty (first load failed)
      if (currentEl.querySelector('.loading')) {
        currentEl.innerHTML = `<div class="error">Couldn't load data from Airtable. Check the PAT, Base ID, and view names in CONFIG.</div>`;
      }
      if (upcomingEl.querySelector('.loading')) {
        upcomingEl.innerHTML = `<div class="error">Couldn't load data from Airtable. Check the PAT, Base ID, and view names in CONFIG.</div>`;
      }
    }
  }

  refreshBoard();
  setInterval(refreshBoard, CONFIG.REFRESH_SECONDS * 1000);
  setInterval(rotatePages, CONFIG.ROTATE_SECONDS * 1000);

  /* ============================================================
     Fullscreen toggle — browsers require a real click/tap to
     enter fullscreen, so we show a small button until it's used.
     ============================================================ */
  const fsBtn = document.getElementById('fullscreen-btn');
  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        console.error('Fullscreen request failed:', err);
      });
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', () => {
    fsBtn.classList.toggle('hidden', !!document.fullscreenElement);
  });
</script>
</body>
</html>
